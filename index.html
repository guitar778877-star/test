<html>
<form id="projectForm">
  <div class="form-group">
    <label>사업명: <input type="text" id="projectName" name="projectName" required></label>
  </div>
  <div class="form-group">
    <label>구역 총 면적 (㎡): <input type="number" id="totalArea" name="totalArea" step="0.01" oninput="calculateNet()" required></label>
  </div>
  <div class="form-group">
    <label>제외 면적 (㎡): <input type="number" id="excludedArea" name="excludedArea" step="0.01" oninput="calculateNet()" required></label>
  </div>
  <div class="form-group" style="background-color: #f0f0f0; padding: 10px;">
    <strong>실사용 대지면적 (㎡): </strong>
    <input type="number" id="usableArea" name="usableArea" readonly>
  </div>
  <button type="submit">프로젝트 저장</button>
</form>
</html>
